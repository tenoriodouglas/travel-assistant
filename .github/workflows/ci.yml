name: CI

# Valida cada PR e cada push fora da main: compila e roda o lint.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'store_assets/**'
      - '**/*.md'
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'
      - 'store_assets/**'
      - '**/*.md'
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # When the secret is set, the debug APK is built with real Travelpayouts data.
      HAS_TP: ${{ secrets.TRAVELPAYOUTS_TOKEN != '' }}
      # When set, also produce a signed release AAB artifact (build only — never published).
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Injects the token from repo secrets into local.properties (git-ignored).
      - name: Configure Travelpayouts token
        if: env.HAS_TP == 'true'
        run: echo "travelpayouts.token=${{ secrets.TRAVELPAYOUTS_TOKEN }}" >> local.properties

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug

      # APK instalável (sideload). Baixe em Actions > run > Artifacts > app-debug-apk.
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      # --- Signed release AAB (build only, NOT published) ---
      # Produces the AAB you upload manually for the app's first Play release.
      # Publishing to Google Play happens only in deploy-play-store.yml, on merge to main.
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Create key.properties
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat > key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed release AAB
        if: env.HAS_KEYSTORE == 'true'
        run: ./gradlew :app:bundleRelease

      - name: Upload release AAB
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
